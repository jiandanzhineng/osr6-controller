name: Release

on:
  push:
    tags:
      - 'v*' # 当推送 v 开头的 tag 时触发，例如 v1.0.0

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # 需要写权限来发布 Release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Build EXE
      # 直接使用 build.py 构建，它会自动安装依赖
      run: python build.py
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/硅基之下OSR6控制插件.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
